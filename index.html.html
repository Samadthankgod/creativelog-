<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creativlog — Samad Designs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:14px}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#1D9E75}
textarea{resize:vertical;min-height:80px}
button{cursor:pointer;border:none;border-radius:8px;font-size:14px;font-weight:500;transition:opacity .15s,background .15s}
button:hover{opacity:.88}
.btn-primary{background:#0F6E56;color:#fff;padding:10px 20px}
.btn-ghost{background:transparent;color:#555;border:1px solid #e5e5e5;padding:8px 16px}
.btn-ghost:hover{background:#f7f7f5;opacity:1}
.spinner{width:28px;height:28px;border:2px solid #e5e5e5;border-top-color:#0F6E56;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:#fff;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;padding:20px 14px;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:0 6px 24px}
.brand-icon{width:32px;height:32px;background:#0F6E56;color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.brand-name{font-size:16px;font-weight:600;letter-spacing:-.3px}
.sidebar-nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;background:transparent;color:#555;font-size:14px;width:100%;text-align:left;font-weight:400;border:none;transition:background .12s,color .12s}
.nav-item:hover{background:#f7f7f5;color:#1a1a1a;opacity:1}
.nav-item.active{background:#E1F5EE;color:#0F6E56;font-weight:500}
.sidebar-footer{padding-top:20px;border-top:1px solid #e5e5e5}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:6px 0}
.user-avatar{width:34px;height:34px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.main-content{margin-left:220px;flex:1;padding:32px 28px;max-width:1000px}
.mobile-topbar{display:none}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.metric-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px 18px}
.metric-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:600;letter-spacing:-.5px}
.metric-sub{font-size:11px;color:#888;margin-top:3px}
.chart-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:18px 20px;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:500;color:#555;margin-bottom:14px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:28px;max-width:580px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;color:#555;font-weight:500}
.jobs-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.jobs-table th{text-align:left;padding:10px 14px;font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e5e5e5;background:#f7f7f5;white-space:nowrap}
.jobs-table td{padding:11px 14px;border-bottom:1px solid #f3f3f3;color:#1a1a1a;vertical-align:middle}
.jobs-table tr:hover td{background:#fafafa}
.cat-badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-row input{flex:1;min-width:180px}
.filter-row select{width:auto}
.toast{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:20px}
.toast.success{background:#E1F5EE;border:1px solid #5DCAA5;color:#0F6E56}
.toast.error{background:#fff0f0;border:1px solid #fca5a5;color:#b91c1c}
.page-title{font-size:22px;font-weight:600;letter-spacing:-.3px;margin-bottom:4px}
.page-sub{color:#888;font-size:14px;margin-bottom:24px}
.empty-state{text-align:center;padding:60px 20px;color:#888}
.empty-icon{font-size:40px;margin-bottom:12px}
@media(max-width:700px){
  .sidebar{display:none}
  .main-content{margin-left:0;padding:0 0 80px}
  .mobile-topbar{display:flex;flex-direction:column;background:#fff;border-bottom:1px solid #e5e5e5;padding:14px 16px 0;position:sticky;top:0;z-index:10}
  .mobile-nav{display:flex;gap:4px;margin-top:10px}
  .mobile-nav-btn{flex:1;padding:8px 4px;border-radius:8px 8px 0 0;background:transparent;color:#888;font-size:13px;border:none;border-bottom:2px solid transparent}
  .mobile-nav-btn.active{color:#0F6E56;border-bottom-color:#0F6E56;font-weight:500}
  .charts-row{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .main-content .page{padding:16px}
}
.page{padding:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } = Recharts;

// ── CONFIG ─────────────────────────────────────────────────
const SUPABASE_URL = 'https://nbdxdrvtbcvhcxelvnbq.supabase.co';
const SUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZHhkcnZ0YmN2aGN4ZWx2bmJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODg5ODksImV4cCI6MjA5NjU2NDk4OX0.YdBbx5UMIkpuIlCCChZS1eJWqZrQbxqpGSi6IjtJNSc
// ───────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CATS = ['FLYER DESIGN','LOGO DESIGN','PRINTS','EDITING','FRAME PRINT'];
const SOURCES = ['Inbound Client','Referral','Friend'];
const CAT_COLORS = {'FLYER DESIGN':'#1D9E75','LOGO DESIGN':'#378ADD','PRINTS':'#BA7517','EDITING':'#888780','FRAME PRINT':'#D4537E'};
const CAT_BG = {'FLYER DESIGN':'#E1F5EE','LOGO DESIGN':'#E6F1FB','PRINTS':'#FAEEDA','EDITING':'#F1EFE8','FRAME PRINT':'#FBEAF0'};

function fmt(n){return '₦'+Math.round(n||0).toLocaleString('en-NG')}
function fmtDate(s){if(!s)return '—';return new Date(s).toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'2-digit'})}
function getMonth(d){const dt=new Date(d);return `${dt.getFullYear()}-${dt.getMonth()+1}`}

// ── AUTH ────────────────────────────────────────────────────
function Auth(){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [mode,setMode]=useState('login');
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');

  async function submit(e){
    e.preventDefault();setLoading(true);setErr('');setMsg('');
    if(mode==='login'){
      const {error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)setErr(error.message);
    } else {
      const {error}=await sb.auth.signUp({email,password:pass});
      if(error)setErr(error.message);
      else setMsg('Account created! Check your email to confirm, then log in.');
    }
    setLoading(false);
  }

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f7f7f5',padding:20}}>
      <div style={{background:'#fff',borderRadius:14,border:'1px solid #e5e5e5',padding:'36px 32px',width:'100%',maxWidth:380}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:44,height:44,background:'#0F6E56',borderRadius:10,color:'#fff',fontSize:22,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>C</div>
          <div style={{fontSize:20,fontWeight:600,letterSpacing:-.3}}>Creativlog</div>
          <div style={{fontSize:13,color:'#888',marginTop:4}}>{mode==='login'?'Sign in to your workspace':'Create your account'}</div>
        </div>
        <form onSubmit={submit}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:'#555',fontWeight:500,display:'block',marginBottom:5}}>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com" required/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:12,color:'#555',fontWeight:500,display:'block',marginBottom:5}}>Password</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required minLength={6}/>
          </div>
          {err&&<div className="toast error" style={{marginBottom:14}}>{err}</div>}
          {msg&&<div className="toast success" style={{marginBottom:14}}>{msg}</div>}
          <button type="submit" className="btn-primary" style={{width:'100%'}} disabled={loading}>
            {loading?'Please wait...':(mode==='login'?'Sign in':'Create account')}
          </button>
        </form>
        <div style={{textAlign:'center',marginTop:18,fontSize:13,color:'#888'}}>
          {mode==='login'?"Don't have an account? ":"Already have an account? "}
          <button onClick={()=>{setMode(mode==='login'?'signup':'login');setErr('');setMsg('')}}
            style={{background:'none',border:'none',color:'#0F6E56',fontWeight:500,cursor:'pointer',fontSize:13,padding:0}}>
            {mode==='login'?'Sign up':'Sign in'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD ───────────────────────────────────────────────
function Dashboard({jobs,loading}){
  const stats=useMemo(()=>{
    if(!jobs.length)return null;
    const now=new Date();
    const curMonth=`${now.getFullYear()}-${now.getMonth()+1}`;
    const pd=new Date(now.getFullYear(),now.getMonth()-1,1);
    const prevMonth=`${pd.getFullYear()}-${pd.getMonth()+1}`;
    const curIncome=jobs.filter(j=>j.month===curMonth).reduce((a,j)=>a+(j.income||0),0);
    const prevIncome=jobs.filter(j=>j.month===prevMonth).reduce((a,j)=>a+(j.income||0),0);
    const totalIncome=jobs.reduce((a,j)=>a+(j.income||0),0);
    const avgJob=jobs.length?totalIncome/jobs.length:0;
    const diff=prevIncome?((curIncome-prevIncome)/prevIncome*100):0;
    const curJobCount=jobs.filter(j=>j.month===curMonth).length;
    const catData=CATS.map(c=>({name:c,value:jobs.filter(j=>j.category===c).reduce((a,j)=>a+(j.income||0),0),color:CAT_COLORS[c]})).filter(c=>c.value>0);
    const monthMap={};
    jobs.forEach(j=>{if(!j.month)return;if(!monthMap[j.month])monthMap[j.month]=0;monthMap[j.month]+=(j.income||0);});
    const monthData=Object.keys(monthMap).sort().map(m=>{const[y,mo]=m.split('-');return{month:new Date(+y,+mo-1).toLocaleDateString('en-NG',{month:'short',year:'2-digit'}),income:monthMap[m]};});
    const cm={};
    jobs.forEach(j=>{if(!j.client)return;if(!cm[j.client])cm[j.client]={name:j.client,income:0,count:0};cm[j.client].income+=(j.income||0);cm[j.client].count++;});
    const topClients=Object.values(cm).sort((a,b)=>b.income-a.income).slice(0,6);
    return{curIncome,prevIncome,diff,totalIncome,avgJob,jobCount:jobs.length,curJobCount,catData,monthData,topClients};
  },[jobs]);

  if(loading)return <div style={{padding:40,color:'#888',textAlign:'center'}}>Loading dashboard...</div>;

  return(
    <div className="page">
      <div style={{marginBottom:28}}>
        <div className="page-title">Dashboard</div>
        <div className="page-sub">{new Date().toLocaleDateString('en-NG',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      {!stats?(
        <div className="empty-state"><div className="empty-icon">📋</div><div style={{fontSize:16,fontWeight:500}}>No jobs yet</div><div style={{fontSize:13,marginTop:4}}>Log your first job to see your dashboard</div></div>
      ):(
        <>
          <div className="metric-grid">
            <div className="metric-card"><div className="metric-label">This month</div><div className="metric-value">{fmt(stats.curIncome)}</div><div className="metric-sub" style={{color:stats.diff>=0?'#0F6E56':'#D85A30'}}>{stats.diff>=0?'↑':'↓'} {Math.abs(stats.diff).toFixed(0)}% vs last month</div></div>
            <div className="metric-card"><div className="metric-label">Total revenue</div><div className="metric-value">{fmt(stats.totalIncome)}</div><div className="metric-sub">{stats.jobCount} jobs total</div></div>
            <div className="metric-card"><div className="metric-label">Avg job value</div><div className="metric-value">{fmt(stats.avgJob)}</div><div className="metric-sub">per job</div></div>
            <div className="metric-card"><div className="metric-label">Jobs this month</div><div className="metric-value">{stats.curJobCount}</div><div className="metric-sub">logged</div></div>
          </div>
          <div className="charts-row">
            <div className="chart-card">
              <div className="chart-title">Monthly income</div>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={stats.monthData} margin={{top:4,right:4,left:0,bottom:20}}>
                  <XAxis dataKey="month" tick={{fontSize:11,fill:'#888'}} angle={-35} textAnchor="end" interval={0}/>
                  <YAxis tick={{fontSize:11,fill:'#888'}} tickFormatter={v=>'₦'+(v>=1000?(v/1000).toFixed(0)+'k':v)} width={46}/>
                  <Tooltip formatter={v=>fmt(v)} contentStyle={{fontSize:12,borderRadius:8,border:'1px solid #e5e5e5'}}/>
                  <Bar dataKey="income" fill="#1D9E75" radius={[4,4,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="chart-card">
              <div className="chart-title">Income by category</div>
              <ResponsiveContainer width="100%" height={200}>
                <PieChart>
                  <Pie data={stats.catData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={70} innerRadius={40}>
                    {stats.catData.map((c,i)=><Cell key={i} fill={c.color}/>)}
                  </Pie>
                  <Tooltip formatter={v=>fmt(v)} contentStyle={{fontSize:12,borderRadius:8,border:'1px solid #e5e5e5'}}/>
                  <Legend iconSize={10} iconType="square" wrapperStyle={{fontSize:11}}/>
                </PieChart>
              </ResponsiveContainer>
            </div>
          </div>
          <div className="chart-card">
            <div className="chart-title">Top clients by revenue</div>
            {stats.topClients.map((c,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:i<stats.topClients.length-1?'1px solid #f0f0f0':'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:'#E1F5EE',color:'#0F6E56',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600}}>{c.name.charAt(0).toUpperCase()}</div>
                  <div><div style={{fontSize:13,fontWeight:500}}>{c.name}</div><div style={{fontSize:11,color:'#888'}}>{c.count} job{c.count!==1?'s':''}</div></div>
                </div>
                <div style={{fontSize:14,fontWeight:600,color:'#0F6E56'}}>{fmt(c.income)}</div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ── LOG JOB ─────────────────────────────────────────────────
function LogJob({onAdd,onDone}){
  const today=new Date().toISOString().split('T')[0];
  const [form,setForm]=useState({date:today,client:'',category:'FLYER DESIGN',income:'',org_price:'',source:'Inbound Client',description:''});
  const [loading,setLoading]=useState(false);
  const [success,setSuccess]=useState(false);
  const [err,setErr]=useState('');

  function set(f,v){setForm(p=>({...p,[f]:v}))}

  async function submit(e){
    e.preventDefault();
    if(!form.client.trim()){setErr('Client name is required.');return}
    if(!form.income||isNaN(form.income)||+form.income<=0){setErr('Enter a valid income amount.');return}
    setLoading(true);setErr('');
    const job={date:form.date,client:form.client.trim(),job_type:form.category,income:+form.income,org_price:+(form.org_price)||0,source:form.source,description:form.description.trim(),category:form.category,month:getMonth(form.date)};
    const result=await onAdd(job);
    setLoading(false);
    if(result.success){setSuccess(true);setForm({date:today,client:'',category:'FLYER DESIGN',income:'',org_price:'',source:'Inbound Client',description:''});setTimeout(()=>setSuccess(false),3000);}
    else setErr('Failed to save. Please try again.');
  }

  const lbl={fontSize:12,color:'#555',fontWeight:500};

  return(
    <div className="page">
      <div className="page-title">Log a job</div>
      <div className="page-sub">Month and totals update automatically.</div>
      <div className="form-card">
        {success&&<div className="toast success">✓ Job saved! Dashboard has been updated.</div>}
        {err&&<div className="toast error">{err}</div>}
        <form onSubmit={submit}>
          <div className="form-grid">
            <div className="form-group"><label style={lbl}>Client name *</label><input value={form.client} onChange={e=>set('client',e.target.value)} placeholder="e.g. Dsiner Mokola"/></div>
            <div className="form-group"><label style={lbl}>Date *</label><input type="date" value={form.date} onChange={e=>set('date',e.target.value)}/></div>
            <div className="form-group"><label style={lbl}>Category *</label><select value={form.category} onChange={e=>set('category',e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="form-group"><label style={lbl}>Income (₦) *</label><input type="number" value={form.income} onChange={e=>set('income',e.target.value)} placeholder="e.g. 8000" min="0"/></div>
            <div className="form-group"><label style={lbl}>Original quoted price (₦)</label><input type="number" value={form.org_price} onChange={e=>set('org_price',e.target.value)} placeholder="0 if same" min="0"/></div>
            <div className="form-group"><label style={lbl}>Source</label><select value={form.source} onChange={e=>set('source',e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="form-group full"><label style={lbl}>Description</label><textarea value={form.description} onChange={e=>set('description',e.target.value)} placeholder="Brief description of the job..."/></div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:24}}>
            <button type="submit" className="btn-primary" style={{flex:1}} disabled={loading}>{loading?'Saving...':'✓ Save job'}</button>
            <button type="button" className="btn-ghost" onClick={onDone}>View all jobs</button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── JOBS LIST ───────────────────────────────────────────────
function JobsList({jobs,loading,onDelete}){
  const [search,setSearch]=useState('');
  const [catF,setCatF]=useState('ALL');
  const [srcF,setSrcF]=useState('ALL');
  const [deleting,setDeleting]=useState(null);

  const filtered=useMemo(()=>jobs.filter(j=>{
    const mc=catF==='ALL'||j.category===catF;
    const ms=srcF==='ALL'||j.source===srcF;
    const q=search.toLowerCase();
    const mq=!q||(j.client||'').toLowerCase().includes(q)||(j.description||'').toLowerCase().includes(q);
    return mc&&ms&&mq;
  }),[jobs,search,catF,srcF]);

  const total=filtered.reduce((a,j)=>a+(j.income||0),0);

  async function del(id){
    if(!window.confirm('Delete this job?'))return;
    setDeleting(id);await onDelete(id);setDeleting(null);
  }

  if(loading)return <div style={{padding:40,color:'#888',textAlign:'center'}}>Loading jobs...</div>;

  return(
    <div className="page">
      <div style={{marginBottom:20}}>
        <div className="page-title">All jobs</div>
        <div className="page-sub">{jobs.length} jobs · {fmt(jobs.reduce((a,j)=>a+(j.income||0),0))} total</div>
      </div>
      <div className="filter-row">
        <input placeholder="Search client or description..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select value={catF} onChange={e=>setCatF(e.target.value)}><option value="ALL">All categories</option>{CATS.map(c=><option key={c}>{c}</option>)}</select>
        <select value={srcF} onChange={e=>setSrcF(e.target.value)}><option value="ALL">All sources</option>{SOURCES.map(s=><option key={s}>{s}</option>)}</select>
      </div>
      {filtered.length===0?(
        <div className="empty-state"><div className="empty-icon">{jobs.length===0?'📋':'🔍'}</div><div>{jobs.length===0?'No jobs logged yet.':'No jobs match your filters.'}</div></div>
      ):(
        <>
          <div style={{background:'#fff',border:'1px solid #e5e5e5',borderRadius:12,overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table className="jobs-table">
                <thead>
                  <tr>
                    <th style={{width:90}}>Date</th>
                    <th style={{width:120}}>Client</th>
                    <th>Description</th>
                    <th style={{width:130}}>Category</th>
                    <th style={{width:80}}>Source</th>
                    <th style={{width:100,textAlign:'right'}}>Income</th>
                    <th style={{width:40}}></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((j,i)=>(
                    <tr key={j.id||i}>
                      <td style={{color:'#888',whiteSpace:'nowrap'}}>{fmtDate(j.date)}</td>
                      <td style={{fontWeight:500}}>{j.client||'—'}</td>
                      <td style={{color:'#555',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>{j.description||'—'}</td>
                      <td><span className="cat-badge" style={{background:CAT_BG[j.category]||'#f0f0f0',color:CAT_COLORS[j.category]||'#555'}}>{j.category}</span></td>
                      <td style={{color:'#888',fontSize:12}}>{j.source||'—'}</td>
                      <td style={{fontWeight:600,color:'#0F6E56',textAlign:'right',whiteSpace:'nowrap'}}>{fmt(j.income||0)}</td>
                      <td><button onClick={()=>del(j.id)} disabled={deleting===j.id} style={{background:'none',border:'none',color:'#ccc',cursor:'pointer',fontSize:18,padding:'0 4px',lineHeight:1}}>{deleting===j.id?'…':'×'}</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          <div style={{marginTop:12,textAlign:'right',fontSize:13,color:'#555'}}>
            Showing {filtered.length} jobs · <strong style={{color:'#0F6E56'}}>{fmt(total)}</strong>
          </div>
        </>
      )}
    </div>
  );
}

// ── APP ─────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('dashboard');
  const [jobs,setJobs]=useState([]);
  const [jobsLoading,setJobsLoading]=useState(false);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setSession(session);setLoading(false);});
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{if(session)fetchJobs();},[session]);

  async function fetchJobs(){
    setJobsLoading(true);
    const{data,error}=await sb.from('jobs').select('*').order('date',{ascending:false});
    if(!error&&data)setJobs(data);
    setJobsLoading(false);
  }

  async function addJob(job){
    const{data,error}=await sb.from('jobs').insert([job]).select();
    if(!error&&data){setJobs(p=>[data[0],...p]);return{success:true};}
    return{success:false,error};
  }

  async function deleteJob(id){
    const{error}=await sb.from('jobs').delete().eq('id',id);
    if(!error)setJobs(p=>p.filter(j=>j.id!==id));
  }

  if(loading)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}><div className="spinner"/></div>;
  if(!session)return <Auth/>;

  const navItems=[{key:'dashboard',label:'Dashboard',icon:'▣'},{key:'log',label:'Log Job',icon:'+'},{key:'jobs',label:'All Jobs',icon:'≡'}];

  return(
    <div className="app-shell">
      <aside className="sidebar">
        <div className="sidebar-brand"><div className="brand-icon">C</div><span className="brand-name">Creativlog</span></div>
        <nav className="sidebar-nav">
          {navItems.map(n=>(
            <button key={n.key} className={`nav-item${tab===n.key?' active':''}`} onClick={()=>setTab(n.key)}>
              <span style={{fontSize:16,width:18,textAlign:'center'}}>{n.icon}</span><span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="user-avatar">SD</div>
            <div><div style={{fontSize:13,fontWeight:500}}>Samad Designs</div><div style={{fontSize:11,color:'#888',overflow:'hidden',textOverflow:'ellipsis',maxWidth:130}}>{session.user.email}</div></div>
          </div>
          <button className="btn-ghost" style={{width:'100%',marginTop:10,fontSize:12}} onClick={()=>sb.auth.signOut()}>Sign out</button>
        </div>
      </aside>
      <main className="main-content">
        <div className="mobile-topbar">
          <span className="brand-name">Creativlog</span>
          <div className="mobile-nav">
            {navItems.map(n=><button key={n.key} className={`mobile-nav-btn${tab===n.key?' active':''}`} onClick={()=>setTab(n.key)}>{n.label}</button>)}
          </div>
        </div>
        <div style={{padding:tab==='dashboard'||tab==='log'||tab==='jobs'?'0':'0'}}>
          {tab==='dashboard'&&<Dashboard jobs={jobs} loading={jobsLoading}/>}
          {tab==='log'&&<LogJob onAdd={addJob} onDone={()=>setTab('jobs')}/>}
          {tab==='jobs'&&<JobsList jobs={jobs} loading={jobsLoading} onDelete={deleteJob}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
