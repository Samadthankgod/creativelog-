<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creativlog</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:14px}
input,select,textarea,button{font-family:inherit}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;outline:none}
input:focus,select:focus,textarea:focus{border-color:#1D9E75}
textarea{resize:vertical;min-height:80px}
button{cursor:pointer;border:none;border-radius:8px;font-size:14px;font-weight:500}
.bg{background:#0F6E56;color:#fff;padding:10px 20px;border:none}
.bg:hover{background:#0a5a45}
.og{background:transparent;color:#555;border:1px solid #e5e5e5;padding:8px 16px}
.og:hover{background:#f0f0f0}
#loader{display:flex;align-items:center;justify-content:center;height:100vh}
.spin{width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:#0F6E56;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#shell{display:flex;min-height:100vh}
.sb{width:210px;background:#fff;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;padding:18px 12px;position:fixed;top:0;left:0;bottom:0;z-index:10}
.logo{display:flex;align-items:center;gap:9px;padding:0 4px 22px}
.li{width:30px;height:30px;background:#0F6E56;color:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.ln{font-size:15px;font-weight:600}
.snav{display:flex;flex-direction:column;gap:2px;flex:1}
.nb{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;background:transparent;color:#555;font-size:14px;width:100%;text-align:left;border:none;cursor:pointer}
.nb:hover{background:#f5f5f5;color:#1a1a1a}
.nb.on{background:#E1F5EE;color:#0F6E56;font-weight:500}
.sf{padding-top:14px;border-top:1px solid #e5e5e5}
.urow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.av{width:30px;height:30px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.main{margin-left:210px;flex:1;padding:28px 24px;max-width:960px}
.pt{font-size:21px;font-weight:600;letter-spacing:-.3px;margin-bottom:3px}
.ps{color:#888;font-size:13px;margin-bottom:22px}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px}
.mc{background:#fff;border:1px solid #e5e5e5;border-radius:9px;padding:14px 16px}
.ml{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.mv{font-size:20px;font-weight:600}
.ms{font-size:11px;color:#888;margin-top:2px}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.cc{background:#fff;border:1px solid #e5e5e5;border-radius:11px;padding:16px 18px}
.ct{font-size:12px;font-weight:500;color:#555;margin-bottom:12px}
.fw{background:#fff;border:1px solid #e5e5e5;border-radius:13px;padding:26px;max-width:550px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.fgr{display:flex;flex-direction:column;gap:5px}
.fgr.full{grid-column:1/-1}
.fl{font-size:12px;color:#555;font-weight:500}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 11px;font-size:10px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e5e5e5;background:#f9f9f7;white-space:nowrap}
.tbl td{padding:10px 11px;border-bottom:1px solid #f3f3f3}
.tbl tr:hover td{background:#fafaf8}
.bdg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.fr{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fr input{flex:1;min-width:160px}
.fr select{width:auto}
.tk{padding:9px 13px;border-radius:7px;font-size:13px;font-weight:500;margin-bottom:14px}
.tok{background:#E1F5EE;border:1px solid #5DCAA5;color:#0F6E56}
.ter{background:#fff0f0;border:1px solid #fca5a5;color:#b91c1c}
.emp{text-align:center;padding:48px 20px;color:#888}
/* AUTH */
.aw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f5;padding:20px}
.ac{background:#fff;border-radius:13px;border:1px solid #e5e5e5;padding:34px 30px;width:100%;max-width:370px}
/* canvas charts */
canvas{display:block;width:100%!important}
/* mobile */
.mob{display:none}
@media(max-width:680px){
  .sb{display:none}
  .main{margin-left:0;padding:0 0 70px}
  .mg{grid-template-columns:1fr 1fr}
  .cr{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}
  .fgr.full{grid-column:1}
  .mob{display:flex;flex-direction:column;background:#fff;border-bottom:1px solid #e5e5e5;padding:12px 14px 0;position:sticky;top:0;z-index:10;margin-bottom:14px}
  .mn{display:flex;gap:3px;margin-top:7px}
  .mn button{flex:1;padding:7px 3px;border-radius:6px 6px 0 0;background:transparent;color:#888;font-size:12px;border:none;border-bottom:2px solid transparent;cursor:pointer}
  .mn button.on{color:#0F6E56;border-bottom-color:#0F6E56;font-weight:500}
  .main .pad{padding:14px}
}
.pad{padding:0}
</style>

<script>
// ═══════════════════════════════════════
const SURL = 'https://nbdxdrvtbcvhcxelvnbq.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZHhkcnZ0YmN2aGN4ZWx2bmJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODg5ODksImV4cCI6MjA5NjU2NDk4OX0.YdBbx5UMIkpuIlCCChZS1eJWqZrQbxqpGSi6IjtJNSc';
// ═══════════════════════════════════════

// Lightweight Supabase client using fetch
const sb = {
  _token: null,
  _uid: null,
  _listeners: [],
  _session: null,

  async _req(method, path, body, auth) {
    const headers = { 'Content-Type': 'application/json', 'apikey': SKEY };
    if (auth || this._token) headers['Authorization'] = 'Bearer ' + (auth || this._token);
    const r = await fetch(SURL + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
    const data = await r.json();
    return { data, ok: r.ok, status: r.status };
  },

  auth: {
    async signIn(email, password) {
      const { data, ok } = await sb._req('POST', '/auth/v1/token?grant_type=password', { email, password });
      if (ok && data.access_token) {
        sb._token = data.access_token;
        sb._uid = data.user?.id;
        sb._session = data;
        localStorage.setItem('sb_token', data.access_token);
        localStorage.setItem('sb_uid', data.user?.id);
        localStorage.setItem('sb_email', data.user?.email);
        sb._notify(data);
        return { error: null };
      }
      return { error: { message: data.error_description || data.msg || 'Login failed' } };
    },
    async signUp(email, password) {
      const { data, ok } = await sb._req('POST', '/auth/v1/signup', { email, password });
      if (ok && data.id) return { error: null, needsConfirm: true };
      return { error: { message: data.msg || data.error_description || 'Signup failed' } };
    },
    async signOut() {
      await sb._req('POST', '/auth/v1/logout', {}, sb._token);
      sb._token = null; sb._uid = null; sb._session = null;
      localStorage.removeItem('sb_token');
      localStorage.removeItem('sb_uid');
      localStorage.removeItem('sb_email');
      sb._notify(null);
    },
    async getSession() {
      const token = localStorage.getItem('sb_token');
      if (!token) return { session: null };
      sb._token = token;
      sb._uid = localStorage.getItem('sb_uid');
      // verify token still valid
      const { data, ok } = await sb._req('GET', '/auth/v1/user');
      if (ok && data.id) {
        sb._session = { user: data };
        return { session: sb._session };
      }
      sb._token = null; sb._uid = null;
      localStorage.removeItem('sb_token');
      return { session: null };
    },
    onStateChange(fn) { sb._listeners.push(fn); }
  },

  _notify(session) { sb._listeners.forEach(fn => fn(session)); },

  async from(table) {
    return {
      _table: table,
      async select(cols) {
        const { data, ok } = await sb._req('GET', `/rest/v1/${table}?select=${cols||'*'}&order=date.desc`);
        return { data: ok ? data : [], error: ok ? null : data };
      },
      async insert(rows) {
        const headers = { 'Content-Type': 'application/json', 'apikey': SKEY, 'Authorization': 'Bearer ' + sb._token, 'Prefer': 'return=representation' };
        const r = await fetch(SURL + `/rest/v1/${table}`, { method: 'POST', headers, body: JSON.stringify(rows) });
        const data = await r.json();
        return { data: r.ok ? data : null, error: r.ok ? null : data };
      },
      async delete(id) {
        const { data, ok } = await sb._req('DELETE', `/rest/v1/${table}?id=eq.${id}`);
        return { error: ok ? null : data };
      }
    };
  }
};

// ── DATA & STATE ─────────────────────────
const CATS = ['FLYER DESIGN','LOGO DESIGN','PRINTS','EDITING','FRAME PRINT'];
const SRCS = ['Inbound Client','Referral','Friend'];
const CC = {'FLYER DESIGN':'#1D9E75','LOGO DESIGN':'#378ADD','PRINTS':'#BA7517','EDITING':'#888780','FRAME PRINT':'#D4537E'};
const CB = {'FLYER DESIGN':'#E1F5EE','LOGO DESIGN':'#E6F1FB','PRINTS':'#FAEEDA','EDITING':'#F1EFE8','FRAME PRINT':'#FBEAF0'};

let SESSION = null, JOBS = [], TAB = 'dashboard';

const N = n => '₦' + Math.round(n||0).toLocaleString('en-NG');
const fD = s => s ? new Date(s).toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'2-digit'}) : '—';
const gM = d => { const dt=new Date(d); return dt.getFullYear()+'-'+(dt.getMonth()+1); };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── INIT ─────────────────────────────────
async function init() {
  const { session } = await sb.auth.getSession();
  SESSION = session;
  if (SESSION) { await loadJobs(); renderApp(); }
  else renderAuth();
}

async function loadJobs() {
  const tbl = await sb.from('jobs');
  const { data } = await tbl.select('*');
  JOBS = data || [];
}

// ── AUTH ─────────────────────────────────
function renderAuth() {
  document.body.innerHTML = `
  <div class="aw">
    <div class="ac">
      <div style="text-align:center;margin-bottom:26px">
        <div style="width:42px;height:42px;background:#0F6E56;border-radius:9px;color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px">C</div>
        <div style="font-size:19px;font-weight:600">Creativlog</div>
        <div style="font-size:13px;color:#888;margin-top:3px" id="asub">Sign in to your workspace</div>
      </div>
      <div id="amsg"></div>
      <div style="margin-bottom:13px">
        <label style="font-size:12px;color:#555;font-weight:500;display:block;margin-bottom:4px">Email</label>
        <input type="email" id="ae" placeholder="you@email.com"/>
      </div>
      <div style="margin-bottom:18px">
        <label style="font-size:12px;color:#555;font-weight:500;display:block;margin-bottom:4px">Password</label>
        <input type="password" id="ap" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"/>
      </div>
      <button class="bg" style="width:100%" id="abtn" onclick="doAuth()">Sign in</button>
      <div style="text-align:center;margin-top:14px;font-size:13px;color:#888">
        <span id="aswt">Don't have an account?</span>
        <button onclick="togAuth()" style="background:none;border:none;color:#0F6E56;font-weight:500;cursor:pointer;font-size:13px;padding:0 4px" id="aswb">Sign up</button>
      </div>
    </div>
  </div>`;
}

let authMode = 'login';
function togAuth() {
  authMode = authMode==='login'?'signup':'login';
  document.getElementById('asub').textContent = authMode==='login'?'Sign in to your workspace':'Create your account';
  document.getElementById('abtn').textContent = authMode==='login'?'Sign in':'Create account';
  document.getElementById('aswt').textContent = authMode==='login'?"Don't have an account?":'Already have an account?';
  document.getElementById('aswb').textContent = authMode==='login'?'Sign up':'Sign in';
  document.getElementById('amsg').innerHTML='';
}

async function doAuth() {
  const email = document.getElementById('ae').value.trim();
  const pass  = document.getElementById('ap').value;
  const btn   = document.getElementById('abtn');
  if(!email||!pass){setAmsg('Please fill in both fields.','ter');return;}
  btn.textContent='Please wait...'; btn.disabled=true;
  if(authMode==='login'){
    const {error} = await sb.auth.signIn(email, pass);
    if(error){setAmsg(error.message,'ter');btn.textContent='Sign in';btn.disabled=false;}
    else{SESSION=sb._session;await loadJobs();renderApp();}
  } else {
    const {error,needsConfirm} = await sb.auth.signUp(email, pass);
    if(error){setAmsg(error.message,'ter');btn.textContent='Create account';btn.disabled=false;}
    else{setAmsg('Account created! Check your email to confirm, then sign in.','tok');btn.textContent='Create account';btn.disabled=false;}
  }
}

function setAmsg(msg,cls){document.getElementById('amsg').innerHTML=`<div class="tk ${cls}">${esc(msg)}</div>`;}

async function doSignOut(){await sb.auth.signOut();SESSION=null;JOBS=[];renderAuth();}

// ── APP SHELL ─────────────────────────────
function renderApp() {
  document.body.innerHTML = `
  <div id="shell">
    <aside class="sb">
      <div class="logo"><div class="li">C</div><span class="ln">Creativlog</span></div>
      <nav class="snav" id="snav">
        ${['dashboard','log','jobs'].map(t=>`
          <button class="nb${TAB===t?' on':''}" onclick="goTab('${t}')">
            ${t==='dashboard'?'▣':t==='log'?'+':'≡'} ${t==='dashboard'?'Dashboard':t==='log'?'Log Job':'All Jobs'}
          </button>`).join('')}
      </nav>
      <div class="sf">
        <div class="urow">
          <div class="av">SD</div>
          <div>
            <div style="font-size:13px;font-weight:500">Samad Designs</div>
            <div style="font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;max-width:125px">${esc(SESSION?.user?.email||'')}</div>
          </div>
        </div>
        <button class="og" style="width:100%;font-size:12px" onclick="doSignOut()">Sign out</button>
      </div>
    </aside>
    <main class="main">
      <div class="mob">
        <span class="ln">Creativlog</span>
        <div class="mn" id="mbn">
          ${['dashboard','log','jobs'].map(t=>`<button class="${TAB===t?'on':''}" onclick="goTab('${t}')">${t==='dashboard'?'Dashboard':t==='log'?'Log Job':'All Jobs'}</button>`).join('')}
        </div>
      </div>
      <div class="pad" id="pg"></div>
    </main>
  </div>`;

function goTab(t) {
  TAB = t;
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('on',['dashboard','log','jobs'][i]===t));
  document.querySelectorAll('.mn button').forEach((b,i)=>b.classList.toggle('on',['dashboard','log','jobs'][i]===t));
  renderPage();
}

function renderPage() {
  const pg = document.getElementById('pg');
  if(!pg) return;
  if(TAB==='dashboard') { pg.innerHTML = dashHTML(); drawCharts(); }
  if(TAB==='log')       pg.innerHTML = logHTML();
  if(TAB==='jobs')      { pg.innerHTML = jobsHTML(); filterJobs(); }
}

// ── DASHBOARD ─────────────────────────────
function dashHTML() {
  const now=new Date(), cm=now.getFullYear()+'-'+(now.getMonth()+1);
  const pd=new Date(now.getFullYear(),now.getMonth()-1,1), pm=pd.getFullYear()+'-'+(pd.getMonth()+1);
  const ci=JOBS.filter(j=>j.month===cm).reduce((a,j)=>a+(j.income||0),0);
  const pi=JOBS.filter(j=>j.month===pm).reduce((a,j)=>a+(j.income||0),0);
  const tot=JOBS.reduce((a,j)=>a+(j.income||0),0);
  const avg=JOBS.length?tot/JOBS.length:0;
  const diff=pi?((ci-pi)/pi*100):0;
  const cc=now.getFullYear()+'-'+(now.getMonth()+1);
  const ccnt=JOBS.filter(j=>j.month===cc).length;

  if(!JOBS.length) return `<div class="pt">Dashboard</div><div class="ps">${new Date().toLocaleDateString('en-NG',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div><div class="emp"><div style="font-size:34px;margin-bottom:10px">📋</div><div style="font-weight:500">No jobs yet</div><div style="font-size:13px;margin-top:4px">Log your first job to see your dashboard</div></div>`;

  const cmap={};
  JOBS.forEach(j=>{if(!j.client)return;if(!cmap[j.client])cmap[j.client]={n:j.client,i:0,c:0};cmap[j.client].i+=(j.income||0);cmap[j.client].c++;});
  const top=Object.values(cmap).sort((a,b)=>b.i-a.i).slice(0,5);

  return `
    <div class="pt">Dashboard</div>
    <div class="ps">${new Date().toLocaleDateString('en-NG',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    <div class="mg">
      <div class="mc"><div class="ml">This month</div><div class="mv">${N(ci)}</div><div class="ms" style="color:${diff>=0?'#0F6E56':'#D85A30'}">${diff>=0?'↑':'↓'} ${Math.abs(diff).toFixed(0)}% vs last month</div></div>
      <div class="mc"><div class="ml">Total revenue</div><div class="mv">${N(tot)}</div><div class="ms">${JOBS.length} jobs total</div></div>
      <div class="mc"><div class="ml">Avg job value</div><div class="mv">${N(avg)}</div><div class="ms">per job</div></div>
      <div class="mc"><div class="ml">Jobs this month</div><div class="mv">${ccnt}</div><div class="ms">logged</div></div>
    </div>
    <div class="cr">
      <div class="cc"><div class="ct">Monthly income</div><canvas id="cmon" height="170"></canvas></div>
      <div class="cc"><div class="ct">Income by category</div><canvas id="ccat" height="170"></canvas></div>
    </div>
    <div class="cc">
      <div class="ct">Top clients by revenue</div>
      ${top.map((c,i)=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;${i<top.length-1?'border-bottom:1px solid #f2f2f2':''}">
          <div style="display:flex;align-items:center;gap:9px">
            <div style="width:26px;height:26px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600">${esc(c.n.charAt(0).toUpperCase())}</div>
            <div><div style="font-size:13px;font-weight:500">${esc(c.n)}</div><div style="font-size:11px;color:#888">${c.c} job${c.c!==1?'s':''}</div></div>
          </div>
          <div style="font-size:13px;font-weight:600;color:#0F6E56">${N(c.i)}</div>
        </div>`).join('')}
    </div>`;
}

function drawCharts() {
  // Monthly bar chart
  const mmap={};
  JOBS.forEach(j=>{if(!j.month)return;mmap[j.month]=(mmap[j.month]||0)+(j.income||0);});
  const mkeys=Object.keys(mmap).sort();
  const mvals=mkeys.map(m=>mmap[m]);
  const mlabels=mkeys.map(m=>{const[y,mo]=m.split('-');return new Date(+y,+mo-1).toLocaleDateString('en-NG',{month:'short'});});

  const mc=document.getElementById('cmon');
  if(mc){
    mc.width=mc.parentElement.clientWidth-36||340;
    mc.height=170;
    const ctx=mc.getContext('2d');
    const maxV=Math.max(...mvals,1);
    const pL=44,pB=28,pT=8,pR=8;
    const cW=mc.width-pL-pR, cH=mc.height-pB-pT;
    ctx.clearRect(0,0,mc.width,mc.height);
    // grid
    [0,.5,1].forEach(f=>{
      const y=pT+cH*(1-f);
      ctx.strokeStyle='#f0f0f0';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cW,y);ctx.stroke();
      ctx.fillStyle='#aaa';ctx.font='9px sans-serif';ctx.textAlign='right';
      ctx.fillText('₦'+(Math.round(maxV*f/1000))+'k',pL-3,y+3);
    });
    const sp=cW/mvals.length, bw=Math.min(sp*0.55,36);
    mvals.forEach((v,i)=>{
      const x=pL+sp*i+(sp-bw)/2, bh=(v/maxV)*cH, y=pT+cH-bh;
      ctx.fillStyle='#1D9E75';
      ctx.beginPath();ctx.roundRect(x,y,bw,bh,3);ctx.fill();
      ctx.fillStyle='#999';ctx.font='9px sans-serif';ctx.textAlign='center';
      ctx.fillText(mlabels[i],x+bw/2,mc.height-4);
    });
  }

  // Category donut
  const catV=CATS.map(c=>JOBS.filter(j=>j.category===c).reduce((a,j)=>a+(j.income||0),0));
  const tot=catV.reduce((a,v)=>a+v,0)||1;
  const catc=document.getElementById('ccat');
  if(catc){
    catc.width=catc.parentElement.clientWidth-36||340;
    catc.height=170;
    const ctx=catc.getContext('2d');
    ctx.clearRect(0,0,catc.width,catc.height);
    const cx=catc.width/2-50,cy=82,R=62,r=32;
    let ang=-Math.PI/2;
    const cols=Object.values(CC);
    catV.forEach((v,i)=>{
      if(!v)return;
      const sl=(v/tot)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,ang,ang+sl);ctx.closePath();
      ctx.fillStyle=cols[i];ctx.fill();
      ang+=sl;
    });
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    CATS.forEach((c,i)=>{
      if(!catV[i])return;
      const ly=16+i*22;
      ctx.fillStyle=cols[i];ctx.fillRect(catc.width-90,ly,9,9);
      ctx.fillStyle='#555';ctx.font='10px sans-serif';ctx.textAlign='left';
      ctx.fillText(c.replace(' DESIGN','').replace(' PRINT',''),catc.width-76,ly+8);
    });
  }
}

// ── LOG JOB ──────────────────────────────
function logHTML(){
  const td=new Date().toISOString().split('T')[0];
  return `
    <div class="pt">Log a job</div>
    <div class="ps">Month and totals update automatically.</div>
    <div class="fw">
      <div id="lmsg"></div>
      <div class="fg">
        <div class="fgr"><label class="fl">Client name *</label><input id="fc" placeholder="e.g. Dsiner Mokola"/></div>
        <div class="fgr"><label class="fl">Date *</label><input type="date" id="fd" value="${td}"/></div>
        <div class="fgr"><label class="fl">Category *</label><select id="fcat">${CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
        <div class="fgr"><label class="fl">Income (₦) *</label><input type="number" id="fi" placeholder="e.g. 8000" min="0"/></div>
        <div class="fgr"><label class="fl">Original quoted price (₦)</label><input type="number" id="fo" placeholder="0 if same" min="0"/></div>
        <div class="fgr"><label class="fl">Source</label><select id="fs">${SRCS.map(s=>`<option>${s}</option>`).join('')}</select></div>
        <div class="fgr full"><label class="fl">Description</label><textarea id="fdesc" placeholder="Brief description..."></textarea></div>
      </div>
      <div style="display:flex;gap:9px;margin-top:18px">
        <button class="bg" style="flex:1" onclick="saveJob()">✓ Save job</button>
        <button class="og" onclick="goTab('jobs')">View all jobs</button>
      </div>
    </div>`;
}

async function saveJob(){
  const client=document.getElementById('fc').value.trim();
  const date=document.getElementById('fd').value;
  const cat=document.getElementById('fcat').value;
  const income=parseFloat(document.getElementById('fi').value)||0;
  const org=parseFloat(document.getElementById('fo').value)||0;
  const src=document.getElementById('fs').value;
  const desc=document.getElementById('fdesc').value.trim();
  const msg=document.getElementById('lmsg');
  if(!client){msg.innerHTML='<div class="tk ter">Client name is required.</div>';return;}
  if(!income){msg.innerHTML='<div class="tk ter">Enter a valid income amount.</div>';return;}
  msg.innerHTML='<div class="tk tok">Saving...</div>';
  const tbl=await sb.from('jobs');
  const {data,error}=await tbl.insert([{date,client,job_type:cat,income,org_price:org,source:src,description:desc,category:cat,month:gM(date)}]);
  if(error){msg.innerHTML=`<div class="tk ter">Error: ${esc(JSON.stringify(error))}</div>`;return;}
  if(data&&data[0])JOBS.unshift(data[0]);
  msg.innerHTML='<div class="tk tok">✓ Job saved!</div>';
  ['fc','fi','fo','fdesc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  setTimeout(()=>{const m=document.getElementById('lmsg');if(m)m.innerHTML='';},3000);
}

// ── JOBS LIST ─────────────────────────────
function jobsHTML(){
  return `
    <div class="pt">All jobs</div>
    <div class="ps">${JOBS.length} jobs · ${N(JOBS.reduce((a,j)=>a+(j.income||0),0))} total</div>
    <div class="fr">
      <input id="js" placeholder="Search client or description..." oninput="filterJobs()"/>
      <select id="jc" onchange="filterJobs()"><option value="">All categories</option>${CATS.map(c=>`<option>${c}</option>`).join('')}</select>
      <select id="jsrc" onchange="filterJobs()"><option value="">All sources</option>${SRCS.map(s=>`<option>${s}</option>`).join('')}</select>
    </div>
    <div id="jtbl"></div>`;
}

function filterJobs(){
  const q=(document.getElementById('js')||{value:''}).value.toLowerCase();
  const cat=(document.getElementById('jc')||{value:''}).value;
  const src=(document.getElementById('jsrc')||{value:''}).value;
  const f=JOBS.filter(j=>{
    return(!cat||j.category===cat)&&(!src||j.source===src)&&
      (!q||(j.client||'').toLowerCase().includes(q)||(j.description||'').toLowerCase().includes(q));
  });
  const wrap=document.getElementById('jtbl');
  if(!wrap)return;
  if(!f.length){wrap.innerHTML=`<div class="emp">${JOBS.length?'🔍 No jobs match your filters.':'📋 No jobs logged yet.'}</div>`;return;}
  const tot=f.reduce((a,j)=>a+(j.income||0),0);
  wrap.innerHTML=`
    <div style="background:#fff;border:1px solid #e5e5e5;border-radius:11px;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr><th style="width:88px">Date</th><th style="width:130px">Client</th><th>Description</th><th style="width:120px">Category</th><th style="width:90px;text-align:right">Income</th><th style="width:32px"></th></tr></thead>
          <tbody>${f.map(j=>`
            <tr>
              <td style="color:#888;white-space:nowrap">${fD(j.date)}</td>
              <td style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">${esc(j.client||'—')}</td>
              <td style="color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">${esc(j.description||'—')}</td>
              <td><span class="bdg" style="background:${CB[j.category]||'#f0f0f0'};color:${CC[j.category]||'#555'}">${esc(j.category)}</span></td>
              <td style="font-weight:600;color:#0F6E56;text-align:right;white-space:nowrap">${N(j.income||0)}</td>
              <td><button onclick="delJob('${j.id}')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:17px;padding:0 2px;line-height:1">×</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div style="margin-top:9px;text-align:right;font-size:13px;color:#555">Showing ${f.length} jobs · <strong style="color:#0F6E56">${N(tot)}</strong></div>`;
}

async function delJob(id){
  if(!confirm('Delete this job?'))return;
  const tbl=await sb.from('jobs');
  const{error}=await tbl.delete(id);
  if(!error){JOBS=JOBS.filter(j=>j.id!==id);filterJobs();}
}

// ── START ─────────────────────────────────
init();
</script>
</body>
</html>
