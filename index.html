<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creativlog — Samad Designs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:14px}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#1D9E75}
textarea{resize:vertical;min-height:80px}
button{cursor:pointer;border:none;border-radius:8px;font-size:14px;font-weight:500;transition:opacity .15s}
button:hover{opacity:.85}
.btn-green{background:#0F6E56;color:#fff;padding:10px 20px;border:none}
.btn-ghost{background:transparent;color:#555;border:1px solid #e5e5e5;padding:8px 16px}
.spinner{width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:#0F6E56;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
/* LAYOUT */
#app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#fff;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;padding:20px 14px;position:fixed;top:0;left:0;bottom:0;z-index:10}
.brand{display:flex;align-items:center;gap:10px;padding:0 6px 24px}
.brand-icon{width:32px;height:32px;background:#0F6E56;color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.brand-name{font-size:16px;font-weight:600}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;background:transparent;color:#555;font-size:14px;width:100%;text-align:left;border:none;transition:background .12s,color .12s}
.nav-btn:hover{background:#f7f7f5;color:#1a1a1a;opacity:1}
.nav-btn.active{background:#E1F5EE;color:#0F6E56;font-weight:500}
.sidebar-foot{padding-top:16px;border-top:1px solid #e5e5e5}
.user-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.main{margin-left:220px;flex:1;padding:32px 28px;max-width:980px}
/* CARDS */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.mcard{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px 18px}
.mlabel{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.mval{font-size:21px;font-weight:600}
.msub{font-size:11px;color:#888;margin-top:3px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:18px 20px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;color:#555;margin-bottom:14px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
/* FORM */
.form-wrap{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:28px;max-width:560px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgroup{display:flex;flex-direction:column;gap:5px}
.fgroup.full{grid-column:1/-1}
.flabel{font-size:12px;color:#555;font-weight:500}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 12px;font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e5e5e5;background:#f7f7f5;white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid #f3f3f3}
.tbl tr:hover td{background:#fafafa}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.filter-row{display:flex;gap:8px;margin-bottom:14px}
.filter-row input{flex:1}
.filter-row select{width:auto}
.toast{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:16px}
.toast.ok{background:#E1F5EE;border:1px solid #5DCAA5;color:#0F6E56}
.toast.err{background:#fff0f0;border:1px solid #fca5a5;color:#b91c1c}
.empty{text-align:center;padding:50px 20px;color:#888}
.pg-title{font-size:22px;font-weight:600;letter-spacing:-.3px;margin-bottom:4px}
.pg-sub{color:#888;font-size:14px;margin-bottom:24px}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f5;padding:20px}
.auth-card{background:#fff;border-radius:14px;border:1px solid #e5e5e5;padding:36px 32px;width:100%;max-width:380px}
/* CHARTS - canvas */
canvas{max-width:100%}
/* MOBILE */
.mob-bar{display:none}
@media(max-width:700px){
  .sidebar{display:none}
  .main{margin-left:0;padding:16px 16px 80px}
  .metric-grid{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .fgroup.full{grid-column:1}
  .mob-bar{display:flex;flex-direction:column;background:#fff;border-bottom:1px solid #e5e5e5;padding:12px 16px 0;position:sticky;top:0;z-index:10;margin-bottom:16px}
  .mob-nav{display:flex;gap:4px;margin-top:8px}
  .mob-nav-btn{flex:1;padding:7px 4px;border-radius:6px 6px 0 0;background:transparent;color:#888;font-size:12px;border:none;border-bottom:2px solid transparent;cursor:pointer}
  .mob-nav-btn.active{color:#0F6E56;border-bottom-color:#0F6E56;font-weight:500}
}
</style>

// ── AUTH ───────────────────────────────────
function renderAuth(){

        <div style="text-align:center;margin-bottom:28px">
          <div style="width:44px;height:44px;background:#0F6E56;border-radius:10px;color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">C</div>
          <div style="font-size:20px;font-weight:600">Creativlog</div>
          <div style="font-size:13px;color:#888;margin-top:4px" id="auth-sub">Sign in to your workspace</div>
        </div>
        <div id="auth-msg"></div>
        <div style="margin-bottom:14px">
          <label style="font-size:12px;color:#555;font-weight:500;display:block;margin-bottom:5px">Email</label>
          <input type="email" id="auth-email" placeholder="you@email.com"/>
        </div>
        <div style="margin-bottom:20px">
          <label style="font-size:12px;color:#555;font-weight:500;display:block;margin-bottom:5px">Password</label>
          <input type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"/>
        </div>
        <button class="btn-green" style="width:100%" id="auth-btn" onclick="doAuth()">Sign in</button>

        </div>
      </div>
    </div>`;
}

let authMode = 'login';
function toggleAuthMode(){
  authMode = authMode==='login'?'signup':'login';
  document.getElementById('auth-sub').textContent = authMode==='login'?'Sign in to your workspace':'Create your account';
  document.getElementById('auth-btn').textContent = authMode==='login'?'Sign in':'Create account';
  document.getElementById('auth-switch-text').textContent = authMode==='login'?"Don't have an account?":'Already have an account?';
  document.getElementById('auth-switch-btn').textContent = authMode==='login'?'Sign up':'Sign in';
  document.getElementById('auth-msg').innerHTML='';
}

async function doAuth(){
  const email = document.getElementById('auth-email').value;
  const pass  = document.getElementById('auth-pass').value;
  const btn   = document.getElementById('auth-btn');
  if(!email||!pass){showAuthMsg('Please fill in both fields.','err');return;}
  btn.textContent='Please wait...'; btn.disabled=true;
  if(authMode==='login'){
    const {error} = await sb.auth.signInWithPassword({email,password:pass});
    if(error){showAuthMsg(error.message,'err');btn.textContent='Sign in';btn.disabled=false;}
  } else {
    const {error} = await sb.auth.signUp({email,password:pass});
    if(error){showAuthMsg(error.message,'err');btn.textContent='Create account';btn.disabled=false;}
    else{showAuthMsg('Account created! Check your email to confirm, then sign in.','ok');btn.textContent='Create account';btn.disabled=false;}
  }
}
function showAuthMsg(msg,type){
  document.getElementById('auth-msg').innerHTML=`<div class="toast ${type}" style="margin-bottom:14px">${esc(msg)}</div>`;
}

async function signOut(){ await sb.auth.signOut(); }

// ── DASHBOARD ──────────────────────────────
function dashboardHTML(){
  const now = new Date();
  const cm  = now.getFullYear()+'-'+(now.getMonth()+1);
  const pd  = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const pm  = pd.getFullYear()+'-'+(pd.getMonth()+1);
  const curInc  = JOBS.filter(j=>j.month===cm).reduce((a,j)=>a+(j.income||0),0);
  const prevInc = JOBS.filter(j=>j.month===pm).reduce((a,j)=>a+(j.income||0),0);
  const total   = JOBS.reduce((a,j)=>a+(j.income||0),0);
  const avg     = JOBS.length ? total/JOBS.length : 0;
  const diff    = prevInc ? ((curInc-prevInc)/prevInc*100) : 0;
  const curCnt  = JOBS.filter(j=>j.month===cm).length;
  const diffTxt = `${diff>=0?'↑':'↓'} ${Math.abs(diff).toFixed(0)}% vs last month`;
  const diffCol = diff>=0?'#0F6E56':'#D85A30';

  if(!JOBS.length) return `<div class="pg-title">Dashboard</div><div class="pg-sub">${new Date().toLocaleDateString('en-NG',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div><div class="empty"><div style="font-size:36px">📋</div><div style="font-size:16px;font-weight:500;margin-top:10px">No jobs yet</div><div style="font-size:13px;margin-top:4px">Log your first job to see your dashboard</div></div>`;

  // top clients
  const cm2={};
  JOBS.forEach(j=>{if(!j.client)return;if(!cm2[j.client])cm2[j.client]={n:j.client,inc:0,cnt:0};cm2[j.client].inc+=(j.income||0);cm2[j.client].cnt++;});
  const top = Object.values(cm2).sort((a,b)=>b.inc-a.inc).slice(0,5);

  return `
    <div class="pg-title">Dashboard</div>
    <div class="pg-sub">${new Date().toLocaleDateString('en-NG',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    <div class="metric-grid">
      <div class="mcard"><div class="mlabel">This month</div><div class="mval">${N(curInc)}</div><div class="msub" style="color:${diffCol}">${diffTxt}</div></div>
      <div class="mcard"><div class="mlabel">Total revenue</div><div class="mval">${N(total)}</div><div class="msub">${JOBS.length} jobs total</div></div>
      <div class="mcard"><div class="mlabel">Avg job value</div><div class="mval">${N(avg)}</div><div class="msub">per job</div></div>
      <div class="mcard"><div class="mlabel">Jobs this month</div><div class="mval">${curCnt}</div><div class="msub">logged</div></div>
    </div>
    <div class="charts-row">
      <div class="card"><div class="card-title">Monthly income</div><canvas id="chart-month" height="180"></canvas></div>
      <div class="card"><div class="card-title">Income by category</div><canvas id="chart-cat" height="180"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Top clients by revenue</div>
      ${top.map((c,i)=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;${i<top.length-1?'border-bottom:1px solid #f0f0f0':''}">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:28px;height:28px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">${esc(c.n.charAt(0).toUpperCase())}</div>
            <div><div style="font-size:13px;font-weight:500">${esc(c.n)}</div><div style="font-size:11px;color:#888">${c.cnt} job${c.cnt!==1?'s':''}</div></div>
          </div>
          <div style="font-size:14px;font-weight:600;color:#0F6E56">${N(c.inc)}</div>
        </div>`).join('')}
    </div>`;
}

function drawCharts(){
  // monthly bar
  const mmap={};
  JOBS.forEach(j=>{if(!j.month)return;if(!mmap[j.month])mmap[j.month]=0;mmap[j.month]+=(j.income||0);});
  const mkeys=Object.keys(mmap).sort();
  const mlabels=mkeys.map(m=>{const[y,mo]=m.split('-');return new Date(+y,+mo-1).toLocaleDateString('en-NG',{month:'short',year:'2-digit'});});
  const mvals=mkeys.map(m=>mmap[m]);

  const mc=document.getElementById('chart-month');
  if(mc){
    const ctx=mc.getContext('2d');
    const barW=Math.max(20,Math.min(40,(mc.offsetWidth-60)/Math.max(mvals.length,1)));
    const maxV=Math.max(...mvals,1);
    mc.width=mc.offsetWidth||400; mc.height=180;
    ctx.clearRect(0,0,mc.width,mc.height);
    const padL=50,padB=40,padT=10,padR=10;
    const chartW=mc.width-padL-padR, chartH=mc.height-padB-padT;
    // grid lines
    ctx.strokeStyle='#f0f0f0';ctx.lineWidth=1;
    [0,.25,.5,.75,1].forEach(f=>{
      const y=padT+chartH*(1-f);
      ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+chartW,y);ctx.stroke();
      ctx.fillStyle='#aaa';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='right';
      ctx.fillText('₦'+(Math.round(maxV*f/1000))+'k',padL-4,y+3);
    });
    // bars
    const bw=Math.min(barW,chartW/mvals.length*0.6);
    const spacing=chartW/mvals.length;
    mvals.forEach((v,i)=>{
      const x=padL+spacing*i+(spacing-bw)/2;
      const bh=(v/maxV)*chartH;
      const y=padT+chartH-bh;
      ctx.fillStyle='#1D9E75';
      roundRect(ctx,x,y,bw,bh,4);
      ctx.fillStyle='#888';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
      ctx.fillText(mlabels[i]||'',x+bw/2,mc.height-4);
    });
  }

  // category donut
  const catvals=CATS.map(c=>JOBS.filter(j=>j.category===c).reduce((a,j)=>a+(j.income||0),0));
  const total=catvals.reduce((a,v)=>a+v,0)||1;
  const catc=document.getElementById('chart-cat');
  if(catc){
    catc.width=catc.offsetWidth||300; catc.height=180;
    const ctx=catc.getContext('2d');
    ctx.clearRect(0,0,catc.width,catc.height);
    const cx=catc.width/2-40, cy=80, R=60, r=30;
    let angle=-Math.PI/2;
    const colors=Object.values(CC);
    catvals.forEach((v,i)=>{
      if(!v)return;
      const slice=(v/total)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,angle,angle+slice);ctx.closePath();
      ctx.fillStyle=colors[i];ctx.fill();
      angle+=slice;
    });
    // hole
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    // legend
    CATS.forEach((c,i)=>{
      if(!catvals[i])return;
      const ly=20+i*22;
      ctx.fillStyle=colors[i];ctx.fillRect(catc.width-75,ly,10,10);
      ctx.fillStyle='#555';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='left';
      ctx.fillText(c.replace(' DESIGN',''),catc.width-60,ly+9);
    });
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();ctx.fill();
}

// ── LOG JOB ────────────────────────────────
function logJobHTML(){
  const today=new Date().toISOString().split('T')[0];
  return `
    <div class="pg-title">Log a job</div>
    <div class="pg-sub">Month and totals update automatically.</div>
    <div class="form-wrap">
      <div id="log-msg"></div>
      <div class="form-grid">
        <div class="fgroup"><label class="flabel">Client name *</label><input id="f-client" placeholder="e.g. Dsiner Mokola"/></div>
        <div class="fgroup"><label class="flabel">Date *</label><input type="date" id="f-date" value="${today}"/></div>
        <div class="fgroup"><label class="flabel">Category *</label><select id="f-cat">${CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
        <div class="fgroup"><label class="flabel">Income (₦) *</label><input type="number" id="f-income" placeholder="e.g. 8000" min="0"/></div>
        <div class="fgroup"><label class="flabel">Original quoted price (₦)</label><input type="number" id="f-org" placeholder="0 if same" min="0"/></div>
        <div class="fgroup"><label class="flabel">Source</label><select id="f-src">${SRCS.map(s=>`<option>${s}</option>`).join('')}</select></div>
        <div class="fgroup full"><label class="flabel">Description</label><textarea id="f-desc" placeholder="Brief description..."></textarea></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn-green" style="flex:1" onclick="saveJob()">✓ Save job</button>
        <button class="btn-ghost" onclick="switchTab('jobs')">View all jobs</button>
      </div>
    </div>`;
}

async function saveJob(){
  const client = document.getElementById('f-client').value.trim();
  const date   = document.getElementById('f-date').value;
  const cat    = document.getElementById('f-cat').value;
  const income = parseFloat(document.getElementById('f-income').value)||0;
  const org    = parseFloat(document.getElementById('f-org').value)||0;
  const src    = document.getElementById('f-src').value;
  const desc   = document.getElementById('f-desc').value.trim();
  const msgEl  = document.getElementById('log-msg');

  if(!client){msgEl.innerHTML='<div class="toast err">Client name is required.</div>';return;}
  if(!income){msgEl.innerHTML='<div class="toast err">Enter a valid income amount.</div>';return;}

  msgEl.innerHTML='<div class="toast ok">Saving...</div>';
  const job={date,client,job_type:cat,income,org_price:org,source:src,description:desc,category:cat,month:getMonth(date)};
  const {data,error}=await sb.from('jobs').insert([job]).select();
  if(error){msgEl.innerHTML=`<div class="toast err">Error: ${esc(error.message)}</div>`;return;}
  JOBS.unshift(data[0]);
  msgEl.innerHTML='<div class="toast ok">✓ Job saved! Dashboard updated.</div>';
  document.getElementById('f-client').value='';
  document.getElementById('f-income').value='';
  document.getElementById('f-org').value='';
  document.getElementById('f-desc').value='';
  setTimeout(()=>{if(document.getElementById('log-msg'))document.getElementById('log-msg').innerHTML='';},3000);
}

// ── JOBS LIST ──────────────────────────────
function jobsHTML(){
  return `
    <div class="pg-title">All jobs</div>
    <div class="pg-sub">${JOBS.length} jobs · ${N(JOBS.reduce((a,j)=>a+(j.income||0),0))} total</div>
    <div class="filter-row">
      <input id="j-search" placeholder="Search client or description..." oninput="filterJobs()"/>
      <select id="j-cat" onchange="filterJobs()"><option value="">All categories</option>${CATS.map(c=>`<option>${c}</option>`).join('')}</select>
      <select id="j-src" onchange="filterJobs()"><option value="">All sources</option>${SRCS.map(s=>`<option>${s}</option>`).join('')}</select>
    </div>
    <div id="jobs-table-wrap"></div>`;
}

function filterJobs(){
  const q   = (document.getElementById('j-search')||{value:''}).value.toLowerCase();
  const cat = (document.getElementById('j-cat')||{value:''}).value;
  const src = (document.getElementById('j-src')||{value:''}).value;
  const filtered = JOBS.filter(j=>{
    const mc=!cat||j.category===cat;
    const ms=!src||j.source===src;
    const mq=!q||(j.client||'').toLowerCase().includes(q)||(j.description||'').toLowerCase().includes(q);
    return mc&&ms&&mq;
  });
  const wrap=document.getElementById('jobs-table-wrap');
  if(!wrap)return;
  if(!filtered.length){wrap.innerHTML='<div class="empty">'+(!JOBS.length?'📋 No jobs logged yet.':'🔍 No jobs match your filters.')+'</div>';return;}
  const total=filtered.reduce((a,j)=>a+(j.income||0),0);
  wrap.innerHTML=`
    <div style="background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr><th style="width:90px">Date</th><th style="width:120px">Client</th><th>Description</th><th style="width:130px">Category</th><th style="width:95px;text-align:right">Income</th><th style="width:36px"></th></tr></thead>
          <tbody>
            ${filtered.map(j=>`
              <tr>
                <td style="color:#888;white-space:nowrap">${fmtD(j.date)}</td>
                <td style="font-weight:500">${esc(j.client||'—')}</td>
                <td style="color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">${esc(j.description||'—')}</td>
                <td><span class="badge" style="background:${CB[j.category]||'#f0f0f0'};color:${CC[j.category]||'#555'}">${esc(j.category)}</span></td>
                <td style="font-weight:600;color:#0F6E56;text-align:right;white-space:nowrap">${N(j.income||0)}</td>
                <td><button onclick="delJob('${j.id}')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:0 2px;line-height:1">×</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div style="margin-top:10px;text-align:right;font-size:13px;color:#555">Showing ${filtered.length} jobs · <strong style="color:#0F6E56">${N(total)}</strong></div>`;
}

async function delJob(id){
  if(!confirm('Delete this job?'))return;
  const{error}=await sb.from('jobs').delete().eq('id',id);
  if(!error){JOBS=JOBS.filter(j=>j.id!==id);filterJobs();}
}

// ── INIT ───────────────────────────────────
sb.auth.onAuthStateChange(async(_,session)=>{
  SESSION=session;
  if(session){
    const{data}=await sb.from('jobs').select('*').order('date',{ascending:false});
    JOBS=data||[];
    ACTIVE_TAB='dashboard';
    render();
  } else {
    JOBS=[];
    render();
  }
});

sb.auth.getSession().then(({data:{session}})=>{
  if(!session){ SESSION=null; render(); }
});
</script>
</body>
</html>
